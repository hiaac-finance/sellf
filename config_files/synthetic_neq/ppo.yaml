general:
  seed: 2025
  algorithm: ppo
  exp_dir: ./results
  n_seeds: 1
  device: 

environment:
  partial_observation: false
  cluster_probabilities:
    - [0.0, 0.0, 0.05, 0.05, 0.05, 0.05, 0.1, 0.1, 0.15, 0.15, 0.15, 0.15, 0.0, 0.0]
    - [0.0, 0.0, 0.05, 0.05, 0.05, 0.05, 0.1, 0.1, 0.15, 0.15, 0.15, 0.15, 0.0, 0.0]
  group_likelihoods: [0.5, 0.5]
