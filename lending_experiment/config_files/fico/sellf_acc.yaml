general:
  seed: 2025
  algorithm: sellf_acc
  exp_dir: ./experiments
  n_seeds: 1
  env_name: "fico"

environment:
  partial_observation: true
  ep_timesteps: 2000
  omega: 0.0
  mu_type: "accuracy"

algorithm:
  train_timesteps: 1_000_000
  eval_timesteps: 50_000
  ad_reg: "sellf"
  learning_rate: 1e-5
  beta_2: 0.5


policy:
  use_predictor: true
  activation_fn: ReLU
  net_arch:
    - 256
    - 256
    - vf: [256, 128]
      pi: [256, 128]